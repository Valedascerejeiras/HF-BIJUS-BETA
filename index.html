<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HF • BIJUS</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #ffe4ec, #f3e8ff, #e0f2ff);
}

header {
    background: #ff69b4;
    color: white;
    text-align: center;
    padding: 20px;
    font-size: 28px;
}

.heart {
    animation: beat 1s infinite;
}
@keyframes beat {
    50% {transform: scale(1.2);}
}

.container {
    padding: 20px;
}

.card {
    background: white;
    border-radius: 15px;
    padding: 15px;
    margin: 15px 0;
    box-shadow: 0 0 10px rgba(255,105,180,0.3);
}

.card:hover {
    box-shadow: 0 0 20px #ff69b4;
}

.price {
    color: #ff1493;
    font-weight: bold;
}

button {
    background: #ff69b4;
    color: white;
    border: none;
    padding: 8px;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 5px;
}

/* ÍCONE */
.cart-icon {
    position: fixed;
    top: 15px;
    right: 15px;
    font-size: 24px;
    cursor: pointer;
}

/* CARRINHO */
.cart-box {
    position: fixed;
    right: 10px;
    top: 60px;
    width: 270px;
    background: white;
    border-radius: 15px;
    padding: 15px;
    box-shadow: 0 0 15px pink;
    display: none;
}

.cart-item {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    margin: 5px 0;
}

.total {
    margin-top: 10px;
    font-weight: bold;
    color: #ff1493;
}
</style>
</head>

<body>

<header>
HF • BIJUS <span class="heart">🩷</span>
</header>

<div class="cart-icon" onclick="toggleCart()">
🛒 (<span id="count">0</span>)
</div>

<div class="cart-box" id="cartBox">
<h3>Seu Carrinho 🩷</h3>

<div id="cartItems"></div>

<div class="total" id="total"></div>

<button onclick="finalizar()">Finalizar no WhatsApp 📲</button>
<button onclick="limpar()">Limpar Carrinho ❌</button>
</div>

<div class="container">

<div class="card">
<h3>Pulseira Simples 🩷</h3>
<p class="price">R$ 5,00</p>
<button onclick="add('Pulseira Simples', 5)">Adicionar</button>
</div>

<div class="card">
<h3>Pulseira de Luxo 🩷</h3>
<p class="price">R$ 7,00</p>
<button onclick="add('Pulseira de Luxo', 7)">Adicionar</button>
</div>

<div class="card">
<h3>Colar 🩷</h3>
<p class="price">R$ 20,00</p>
<button onclick="add('Colar', 20)">Adicionar</button>
</div>

<div class="card">
<h3>Brinco 🩷</h3>
<p class="price">R$ 5,00</p>
<button onclick="add('Brinco', 5)">Adicionar</button>
</div>

</div>

<script>
let carrinho = [];

function add(nome, preco) {
    carrinho.push({nome, preco});
    atualizar();
}

function atualizar() {
    document.getElementById("count").innerText = carrinho.length;

    let lista = "";
    let total = 0;

    carrinho.forEach((item, index) => {
        total += item.preco;

        lista += `
        <div class="cart-item">
            🩷 ${item.nome} - R$ ${item.preco.toFixed(2)}
            <span onclick="remover(${index})" style="cursor:pointer;">❌</span>
        </div>`;
    });

    document.getElementById("cartItems").innerHTML = lista;
    document.getElementById("total").innerText = "Total: R$ " + total.toFixed(2);
}

function remover(index) {
    carrinho.splice(index, 1);
    atualizar();
}

function limpar() {
    carrinho = [];
    atualizar();
}

function toggleCart() {
    let box = document.getElementById("cartBox");
    box.style.display = box.style.display === "block" ? "none" : "block";
}

function finalizar() {
    if (carrinho.length === 0) {
        alert("Carrinho vazio!");
        return;
    }

    let msg = "Olá! Quero comprar:\n\n";
    let total = 0;

    carrinho.forEach(item => {
        msg += "🩷 " + item.nome + " - R$ " + item.preco.toFixed(2) + "\n";
        total += item.preco;
    });

    msg += "\nTotal: R$ " + total.toFixed(2);

    let url = "https://wa.me/553891580022?text=" + encodeURIComponent(msg);
    window.open(url, "_blank");
}
</script>

</body>
    </html>
