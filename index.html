<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HF • BIJUS</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #ffe4ec, #f3e8ff, #e0f2ff);
    overflow-x: hidden;
}

/* 🌸 FLORES */
.flor {
    position: fixed;
    top: -50px;
    pointer-events: none;
    animation: cair linear infinite;
    opacity: 0.7;
}

@keyframes cair {
    0% { transform: translate(0,0) rotate(0deg); }
    50% { transform: translate(40px,50vh) rotate(180deg); }
    100% { transform: translate(-40px,110vh) rotate(360deg); }
}

/* HEADER */
header {
    background: #ff69b4;
    color: white;
    text-align: center;
    padding: 20px;
    font-size: 30px;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    padding: 20px;
}

/* CARD */
.card {
    background: white;
    border-radius: 15px;
    padding: 15px;
    text-align: center;
    position: relative;
    overflow: hidden;
}

/* BRILHO */
.card::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.6), transparent);
    animation: brilho 3s infinite;
}

@keyframes brilho {
    0% { left: -100%; }
    100% { left: 100%; }
}

.card img {
    width: 100%;
    height: 150px;
    border-radius: 10px;
    cursor: pointer;
}

.price {
    color: #ff1493;
    font-weight: bold;
}

button {
    background: #ff69b4;
    color: white;
    border: none;
    padding: 8px;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 5px;
}

/* OVERLAY */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    display: none;
    z-index: 9998;
}

/* CARRINHO APP */
.cart-box {
    position: fixed;
    top: 0;
    right: -320px;
    width: 300px;
    height: 100%;
    background: white;
    padding: 15px;
    transition: right 0.4s ease;
    z-index: 9999;
    overflow-y: auto;
}

.cart-box.open {
    right: 0;
}

.cart-icon {
    position: fixed;
    top: 15px;
    right: 15px;
    font-size: 24px;
    cursor: pointer;
    z-index: 10000;
}

.cart-item {
    display: flex;
    justify-content: space-between;
}

.total {
    margin-top: 10px;
    font-weight: bold;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    z-index: 10001;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
}

.modal img {
    display: block;
    margin: 5% auto;
    max-width: 80%;
    border-radius: 10px;
}
</style>
</head>

<body>

<header>HF • BIJUS 🩷</header>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="fecharCarrinho()"></div>

<!-- CARRINHO -->
<div class="cart-icon" onclick="toggleCart()">🛒 (<span id="count">0</span>)</div>

<div class="cart-box" id="cartBox">
<h3>Carrinho 🩷</h3>
<div id="cartItems"></div>
<div class="total" id="total"></div>
<button onclick="finalizar()">Finalizar 📲</button>
<button onclick="limpar()">Limpar ❌</button>
</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="fecharModal()">
<img id="imgGrande">
</div>

<!-- PRODUTOS -->
<div class="container">

<script>
const produtos = [
["Pulseira",5,"produto1.png"],
["Colar",20,"produto2.png"],
["Brinco",5,"produto3.png"],
["Bracelete",15,"produto4.png"],
["Chaveiro",10,"produto5.png"],
["Produto 6",10,"produto6.png"],
["Produto 7",10,"produto7.png"],
["Produto 8",10,"produto8.png"],
["Produto 9",10,"produto9.png"],
["Produto 10",10,"produto10.png"]
];

document.write(produtos.map(p => `
<div class="card">
<img src="${p[2]}" onclick="abrirImagem('${p[2]}')">
<h3>${p[0]}</h3>
<p class="price">R$ ${p[1]}</p>
<button onclick="add('${p[0]}', ${p[1]})">Adicionar</button>
</div>
`).join(""));
</script>

</div>

<script>
let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];

function salvar() {
    localStorage.setItem("carrinho", JSON.stringify(carrinho));
}

function add(nome, preco) {
    carrinho.push({nome, preco});
    salvar();
    atualizar();
}

function atualizar() {
    document.getElementById("count").innerText = carrinho.length;

    let lista = "";
    let total = 0;

    carrinho.forEach((item, i) => {
        total += item.preco;
        lista += `
        <div class="cart-item">
            ${item.nome} - R$ ${item.preco}
            <span onclick="remover(${i})">❌</span>
        </div>`;
    });

    document.getElementById("cartItems").innerHTML = lista;
    document.getElementById("total").innerText = "Total: R$ " + total;
}

function remover(i) {
    carrinho.splice(i, 1);
    salvar();
    atualizar();
}

function limpar() {
    carrinho = [];
    salvar();
    atualizar();
}

function toggleCart() {
    document.getElementById("cartBox").classList.add("open");
    document.getElementById("overlay").style.display = "block";
}

function fecharCarrinho() {
    document.getElementById("cartBox").classList.remove("open");
    document.getElementById("overlay").style.display = "none";
}

function finalizar() {
    let msg = "Olá, quero comprar:\n";
    carrinho.forEach(i => msg += i.nome + "\n");
    window.open("https://wa.me/553891580022?text=" + encodeURIComponent(msg));
}

function abrirImagem(src) {
    document.getElementById("modal").style.display = "block";
    document.getElementById("imgGrande").src = src;
}

function fecharModal() {
    document.getElementById("modal").style.display = "none";
}

/* 🌸 FLORES */
const flores = ["🌸","🌺","🌷","💮"];

function criarFlores() {
    for (let i = 0; i < 25; i++) {
        let flor = document.createElement("div");
        flor.classList.add("flor");
        flor.innerHTML = flores[Math.floor(Math.random()*flores.length)];
        flor.style.left = Math.random() * 100 + "vw";
        flor.style.animationDuration = (6 + Math.random() * 6) + "s";
        flor.style.fontSize = (15 + Math.random() * 20) + "px";
        document.body.appendChild(flor);
    }
}

criarFlores();
atualizar();
</script>

</body>
    </html>
