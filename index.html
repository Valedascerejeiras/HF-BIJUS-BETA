<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HF • BIJUS</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #fceb7, #d86d9c, #a4a2cc);
    overflow-x: hidden;
}

/* HEADER */
header {
    background: #d86d9c; /* Paris Pink */
    color: white;
    text-align: center;
    padding: 20px;
    font-size: 28px;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    padding: 20px;
}

/* CARD */
.card {
    background: white;
    border-radius: 15px;
    padding: 15px;
    text-align: center;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

/* BRILHO */
.card::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.6), transparent);
    animation: brilho 3s infinite;
}

@keyframes brilho {
    0% { left: -100%; }
    100% { left: 100%; }
}

.card img {
    width: 100%;
    height: 150px;
    border-radius: 10px;
    cursor: pointer;
}

.price {
    color: #fbceb7; /* Ibis Pink */
    font-weight: bold;
}

/* BOTÕES */
button {
    background: #a4a2cc; /* Indigo Child */
    color: white;
    border: none;
    padding: 8px;
    border-radius: 10px;
    cursor: pointer;
}

/* 🛒 CARRINHO ÍCONE */
.cart-icon {
    position: fixed;
    bottom: 15px;
    right: 15px;
    background: #d86d9c;
    color: white;
    padding: 10px 15px;
    border-radius: 50px;
    font-size: 14px;
    cursor: pointer;
    z-index: 10000;
}

/* OVERLAY */
.overlay {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    display: none;
    z-index: 9998;
}

/* 🛒 CARRINHO DE BAIXO */
.cart-box {
    position: fixed;
    bottom: -100%;
    left: 0;
    width: 100%;
    background: white;
    border-radius: 20px 20px 0 0;
    padding: 20px;
    transition: bottom 0.4s ease;
    z-index: 9999;
    max-height: 70%;
    overflow-y: auto;
}

.cart-box.open {
    bottom: 0;
}

.cart-item {
    display: flex;
    justify-content: space-between;
}

.total {
    margin-top: 10px;
    font-weight: bold;
    color: #d86d9c;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    z-index: 10001;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
}

.modal img {
    display: block;
    margin: 10% auto;
    max-width: 80%;
    border-radius: 10px;
}
</style>
</head>

<body>

<header>HF • BIJUS 🩷</header>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="fecharCarrinho()"></div>

<!-- 🛒 ÍCONE -->
<div class="cart-icon" onclick="abrirCarrinho()">
🛒 R$ <span id="totalIcon">0</span>
</div>

<!-- CARRINHO -->
<div class="cart-box" id="cartBox">
<h3>Seu Carrinho 🩷</h3>
<div id="cartItems"></div>
<div class="total" id="total"></div>
<button onclick="finalizar()">Finalizar 📲</button>
<button onclick="limpar()">Limpar ❌</button>
</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="fecharModal()">
<img id="imgGrande">
</div>

<!-- PRODUTOS -->
<div class="container">

<script>
const produtos = [
["Pulseira",5,"produto1.png"],
["Colar",20,"produto2.png"],
["Brinco",5,"produto3.png"],
["Bracelete",15,"produto4.png"]
];

document.write(produtos.map(p => `
<div class="card">
<img src="${p[2]}" onclick="abrirImagem('${p[2]}')">
<h3>${p[0]}</h3>
<p class="price">R$ ${p[1]}</p>
<button onclick="add('${p[0]}', ${p[1]})">Adicionar</button>
</div>
`).join(""));
</script>

</div>

<script>
let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];

function salvar() {
    localStorage.setItem("carrinho", JSON.stringify(carrinho));
}

function add(nome, preco) {
    carrinho.push({nome, preco});
    salvar();
    atualizar();
}

function atualizar() {
    let lista = "";
    let total = 0;

    carrinho.forEach((item, i) => {
        total += item.preco;
        lista += `
        <div class="cart-item">
            ${item.nome} - R$ ${item.preco}
            <span onclick="remover(${i})">❌</span>
        </div>`;
    });

    document.getElementById("cartItems").innerHTML = lista;
    document.getElementById("total").innerText = "Total: R$ " + total;
    document.getElementById("totalIcon").innerText = total;
}

function remover(i) {
    carrinho.splice(i, 1);
    salvar();
    atualizar();
}

function limpar() {
    carrinho = [];
    salvar();
    atualizar();
}

function abrirCarrinho() {
    document.getElementById("cartBox").classList.add("open");
    document.getElementById("overlay").style.display = "block";
}

function fecharCarrinho() {
    document.getElementById("cartBox").classList.remove("open");
    document.getElementById("overlay").style.display = "none";
}

function finalizar() {
    let msg = "Olá, quero comprar:\n";
    carrinho.forEach(i => msg += i.nome + "\n");
    window.open("https://wa.me/553891580022?text=" + encodeURIComponent(msg));
}

function abrirImagem(src) {
    document.getElementById("modal").style.display = "block";
    document.getElementById("imgGrande").src = src;
}

function fecharModal() {
    document.getElementById("modal").style.display = "none";
}

atualizar();
</script>

</body>
    </html>
